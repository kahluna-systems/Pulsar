# KahLuna Pulsar - Docker Compose
# Use: docker compose up -d

services:
  # Pulsar Node (can run standalone or with hub)
  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "8000:8000"
    environment:
      - NODE_ID=node-docker-01
      - NODE_NAME=Pulsar Docker Node
      - STANDALONE_MODE=true
      # Keep the database and generated config on the named volume so they
      # survive container rebuilds (and secret_key stays stable).
      - DATABASE_PATH=/app/data/tests.db
      - NODE_CONFIG=/app/data/node_config.json
    volumes:
      - node_data:/app/data
      - ./node/static:/app/node/static:ro
    cap_add:
      - NET_RAW    # ping, ICMP/TCP traceroute, mtr
      - NET_ADMIN  # tcpdump promiscuous-mode capture
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/node/info"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL for Hub (optional)
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: pulsar
  #     POSTGRES_USER: pulsar
  #     POSTGRES_PASSWORD: changeme
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

  # Central Hub (optional - uncomment to enable)
  # hub:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.hub
  #   ports:
  #     - "8080:8000"
  #   environment:
  #     - DATABASE_URL=postgresql://pulsar:changeme@postgres:5432/pulsar
